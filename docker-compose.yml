services:

  postgres:
    image: postgres:15-alpine
    container_name: flashorder_db
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      POSTGRES_USER: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: flashorder_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      NODE_ENV: production
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: flashorder_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file: ./frontend/.env
    ports:
      - "5173:5173"

volumes:
  postgres_data: